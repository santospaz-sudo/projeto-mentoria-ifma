<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <title>Mentoria IFMA - Login</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>
    <!-- Logo no topo à esquerda -->
    <img src="ifma - Copia.png" alt="Logo IFMA" class="logo-ifma">

    <!-- Container de Login -->
    <div class="container-login">
        <h2>Login</h2>
        <form id="loginForm" method="post">
            <input type="email" id="email" placeholder="Email Acadmico" required>
            <div class="senha-container">
                <input type="password" id="senha" placeholder="Digite sua senha atual" required>
                <span id="toggleSenha" class="toggle-icon">
                    <i class="fa fa-eye-slash"></i>
                </span>
            </div>
            <button type="submit">ENTRAR</button>
        </form>
        <p>Não tem conta? <a href="cadastro.html">Cadastre-se</a></p>
    </div>

    <script src="js/login.js" defer></script>
    <script src="js/toggleSenha.js" defer></script>
</body>

</html>
